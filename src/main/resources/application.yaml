spring:
  config:
    import: "optional:aws-parameterstore:/config/myapp/"

  data:
    redis:
      port: 6379
      ssl:
        enabled: false
      timeout: 5s

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

cloud:
  aws:
    region:
      static: sa-east-1